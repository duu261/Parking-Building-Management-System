services:
  db:
    image: postgres:16
    container_name: parkmaster-db
    environment:
      POSTGRES_DB: parkmaster
      POSTGRES_USER: parkmaster
      POSTGRES_PASSWORD: parkmaster
    ports:
      - "5432:5432"
    volumes:
      - parkmaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkmaster -d parkmaster"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parkmaster_pgdata:
