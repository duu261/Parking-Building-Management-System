spring:
  application:
    name: parkmaster-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parkmaster}
    username: ${DB_USERNAME:parkmaster}
    password: ${DB_PASSWORD:parkmaster}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  mvc:
    problemdetails:
      enabled: true

server:
  # Render injects PORT; SERVER_PORT for local override; 5000 default.
  port: ${PORT:${SERVER_PORT:5000}}

parkmaster:
  jwt:
    # 256-bit base64 secret. Override in prod via PARKMASTER_JWT_SECRET.
    secret: ${PARKMASTER_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTI1Ni1iaXQ=}
    access-token-ttl-minutes: ${PARKMASTER_JWT_TTL:120}
  cors:
    # Comma-separated. Set FRONTEND_ORIGIN to the deployed frontend URL in prod.
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173,http://192.168.1.16:5173,https://localhost:5173,https://192.168.1.16:5173}
  gemini:
    # Free AI assistant. Get a key at https://aistudio.google.com/apikey.
    # Empty key => assistant falls back to built-in local FAQ answers.
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  vnpay:
    # Sandbox merchant credentials from https://sandbox.vnpayment.vn (register a test merchant).
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    # vnp_ReturnUrl we hand to VNPay — must be this backend's public callback.
    return-url: ${VNPAY_RETURN_URL:http://localhost:5000/api/public/payments/vnpay-return}
    # Frontend page the callback redirects the browser to after verifying.
    result-url: ${VNPAY_RESULT_URL:http://localhost:5173/driver/payments}

logging:
  level:
    org.springframework.security: INFO
